name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Unit tests
        run: go test -run "TestGetNodeExecutable|TestGetDriverCliJs|TestNodePlatformSuffix|TestPatchDriverBundle|TestNpmRegistryEnv|TestRunOptionsRedirectStderr" ./... -v -count=1

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install driver and browsers
        run: go run ./cmd/patchright install chromium

      - name: Integration tests
        run: go test -run "TestDriverInstall|TestShouldNotHangWhenPlaywrightUnexpectedExit" ./... -v -count=1 -timeout 120s
