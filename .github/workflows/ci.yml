name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Unit tests (no browser needed)
        run: go test -run "TestGetNodeExecutable|TestGetDriverCliJs|TestNodePlatformSuffix|TestPatchDriverBundle|TestNpmRegistryEnv|TestRunOptionsRedirectStderr|TestPatchHeadlessUA" ./... -v -count=1

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install driver and browsers
        run: go run ./cmd/patchright install chromium

      - name: Driver install test
        run: go test -run "TestDriverInstall" ./... -v -count=1 -timeout 120s

  feature-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install driver and browsers
        run: go run ./cmd/patchright install chromium

      - name: Feature tests
        run: go test -run "TestCSSSelector|TestXPathSelector|TestTextSelector|TestEvaluate|TestClick|TestDoubleClick|TestHover|TestFill|TestPressSequentially|TestSelectDropdown|TestCheckbox|TestKeyboard|TestWaitForSelector|TestLocator|TestPage|TestMainFrame|TestNavigatorWebdriver|TestStealthUA" ./... -v -count=1 -timeout 120s
